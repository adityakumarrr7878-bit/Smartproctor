<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Verify Roll</title><link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"></head>
<body><div class="auth-wrap">
<div style="position:absolute;top:24px;left:48px"><a href="{{ url_for('index') }}" class="home-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a></div>
<div class="auth-card"><h2>Verify Identity</h2><p>Enter your roll number to access <strong>{{ exam.title }}</strong></p>
{% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
<form method="POST"><div class="form-group"><label>Roll Number</label><input type="text" name="roll_number" required placeholder="e.g. 101" autofocus></div>
<button type="submit" class="btn btn-primary">Verify & Continue →</button></form></div></div>
<script src="{{ url_for('static',filename='js/script.js') }}"></script></body></html>
