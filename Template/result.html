<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submitted — SmartProctor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="result-wrap">
  <div class="result-card">
    <div class="result-icon">✅</div>
    <h2>Successfully Submitted!</h2>
    <p>Your exam has been recorded. Thank you for taking the exam.</p>

    <div class="result-stats">
      <div class="stat-box">
        <div class="num">{{ q_count }}</div>
        <div class="lbl">Total Questions</div>
      </div>
      <div class="stat-box">
        <div class="num">{{ attempted }}</div>
        <div class="lbl">Attempted</div>
      </div>
    </div>

    <a href="{{ url_for('index') }}" class="btn btn-primary" style="width:auto;margin:0 auto">
      ← Back to Home
    </a>
  </div>
</div>
</body>
</html>
